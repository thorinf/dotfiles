# Starship prompt config
# Reference: https://starship.rs/config/

add_newline = false
command_timeout = 100

[character]
success_symbol = "[❯](green)"
error_symbol = "[❯](red)"

[directory]
truncation_length = 3
truncate_to_repo = true
style = "cyan"

[git_branch]
symbol = " "
format = "[$symbol$branch]($style) "
style = "purple"

[git_status]
ahead = "⇡${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
behind = "⇣${count}"
style = "red"

[python]
symbol = " "
style = "yellow"

[cmd_duration]
min_time = 2_000
style = "yellow"

[hostname]
ssh_only = true
format = "[$hostname]($style) "
style = "dimmed green"

[username]
disabled = true

[package]
disabled = true
