# Starship prompt config
# Reference: https://starship.rs/config/

add_newline = false
command_timeout = 100

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[directory]
truncation_length = 3
truncate_to_repo = true

[git_branch]
symbol = " "

[git_status]
ahead = "⇡${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
behind = "⇣${count}"

[python]
symbol = " "

[cmd_duration]
min_time = 2_000

[hostname]
ssh_only = true
format = "[$hostname]($style) "

[username]
disabled = true

[package]
disabled = true
